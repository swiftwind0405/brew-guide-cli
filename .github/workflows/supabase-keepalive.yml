name: supabase-keepalive

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase Auth health endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          : "${SUPABASE_URL:?SUPABASE_URL secret is required}"
          : "${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY secret is required}"

          URL="${SUPABASE_URL%/}/auth/v1/health"

          STATUS=$(curl --silent --show-error \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 30 \
            --output response.json \
            --write-out "%{http_code}" \
            "$URL" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Accept: application/json")

          echo "HTTP status: $STATUS"

          if [ -s response.json ]; then
            cat response.json
          else
            echo "Empty response body"
          fi

          if [ "$STATUS" = "540" ]; then
            echo "Supabase project appears paused. Restore it from the Supabase dashboard."
            exit 1
          fi

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Unexpected status: $STATUS"
            exit 1
          fi
